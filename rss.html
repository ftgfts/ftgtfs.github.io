<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS UI</title>

  <style>
    :root {
      --bg: #000000;
      --card: #000000;
      --border: #333333;
      --text: #ffffff;
      --muted: #888888;
      --accent: #ffffff;
      --hover: #111111;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      display: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .feed {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 0;
      overflow: hidden;
    }

    .feed-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #000000;
    }

    .feed-name-link {
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
    }

    .feed-name-link:hover {
      color: var(--accent);
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .skeleton {
      height: 120px;
      background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 0;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .card {
      border: 1px solid var(--border);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-radius: 0;
      cursor: pointer;
      background: var(--card);
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      background: var(--hover);
      border-color: #555;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 8px;
      min-width: 0;
    }

    .card-image {
      width: 100%;
      height: 200px;
      flex-shrink: 0;
      background: #000;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .card-btn {
      margin-top: auto;
      align-self: flex-start;
      font-size: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 0;
      font-weight: 500;
    }

    #post-view {
      padding: 24px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .post-title {
      font-size: 2rem;
      margin: 0 0 12px 0;
      line-height: 1.3;
    }

    .post-meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .post-feed-badge {
      background: #111;
      padding: 4px 8px;
      border-radius: 0;
      border: 1px solid var(--border);
    }

    .post-image {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      margin-bottom: 24px;
      background: #000;
      border-radius: 0;
      border: 1px solid var(--border);
    }

    .post-content {
      line-height: 1.7;
      font-size: 1.1rem;
      color: #fff;
      overflow-wrap: break-word;
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 0;
      margin: 16px 0;
    }

    .post-content a {
      color: var(--text);
      text-decoration: underline;
    }

    .post-content p {
      margin-bottom: 1.2em;
    }

    .post-content blockquote {
      border-left: 4px solid var(--border);
      margin: 0 0 1.2em 0;
      padding-left: 16px;
      color: var(--muted);
      font-style: italic;
    }

    .post-content pre {
      background: #111;
      padding: 16px;
      overflow-x: auto;
      border: 1px solid var(--border);
      margin-bottom: 1.2em;
    }

    .post-content code {
      font-family: monospace;
      background: #111;
      padding: 2px 4px;
      font-size: 0.9em;
    }

    .post-content pre code {
      background: none;
      padding: 0;
    }

    .post-content ul,
    .post-content ol {
      margin-bottom: 1.2em;
      padding-left: 24px;
    }

    .post-link {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 20px;
      background: var(--text);
      color: #000;
      text-decoration: none;
      border-radius: 0;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .post-link:hover {
      opacity: 0.9;
    }

    .status-badge {
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <div class="header">
    <button id="back-btn" class="back-btn" style="display: none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      Back
    </button>
    <span id="header-title">RSS Reader</span>
  </div>

  <div id="main" class="container"></div>
  <div id="feed-view" class="container" style="display:none;"></div>
  <div id="post-view" style="display:none;"></div>

  <script>
    const feeds = {
      "YTS YIFY Featured Movies": "https://atlas.rssly.org/feed/0/720p/all/0/en",
      "Hacker News": "https://news.ycombinator.com/rss",
      "World News": "https://feeds.bbci.co.uk/news/world/rss.xml",
      "TechCrunch": "https://techcrunch.com/feed/",
      "Reddit /r/programming": "https://www.reddit.com/r/programming/.rss",
      "NASA News": "https://www.nasa.gov/rss/dyn/breaking_news.rss",
      "Ars Technica - Science": "https://feeds.arstechnica.com/arstechnica/science/"
    };

    const TTL = 1000 * 60 * 10;

    function getCache(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (Date.now() - parsed.time > TTL) return null;
        return parsed;
      } catch (e) {
        return null;
      }
    }

    function setCache(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify({ time: Date.now(), data }));
      } catch (e) { }
    }

    const allData = {};
    let currentView = 'main';
    let currentFeedName = null;
    const historyStack = [];

    function decodeHTML(htmlStr) {
      const txt = document.createElement("textarea");
      txt.innerHTML = htmlStr;
      return txt.value;
    }

    function text(el) { return el?.textContent?.trim() || ""; }
    function html(el) { return el?.innerHTML?.trim() || ""; }

    function pick(p, arr) {
      for (const s of arr) {
        const el = p.querySelector(s);
        if (el) return el;
      }
      return null;
    }

    function attr(el, a) { return el?.getAttribute?.(a) || ""; }

    function parse(doc) {
      const nodes = [...doc.querySelectorAll("item"), ...doc.querySelectorAll("entry")];
      const seen = new Set();
      const out = [];

      for (const n of nodes) {
        const title = text(pick(n, ["title"]));
        let link = "";

        const linkEl = pick(n, ["link[rel='alternate']", "link[href]", "link"]);
        if (linkEl) {
          link = attr(linkEl, "href") || text(linkEl);
        }

        if (!title || !link || seen.has(link)) continue;
        seen.add(link);

        const content = pick(n, ["content\\:encoded", "content", "summary", "description"]);
        let raw = "";
        if (content) {
          if (content.firstElementChild) {
            raw = content.innerHTML.trim();
          } else {
            raw = content.textContent.trim();
            if (raw.includes("&lt;")) {
              raw = decodeHTML(raw);
            }
          }
        }

        let img = "";
        const media = pick(n, ["media\\:thumbnail", "media\\:content"]);
        if (media) img = attr(media, "url");

        if (!img) {
          const m = raw.match(/<img[^>]+src="([^"]+)"/i);
          if (m) img = m[1];
        }

        out.push({ title, link, desc: raw, img });
      }

      return out;
    }

    async function fetchFeed(url) {
      const proxies = [
        "https://api.allorigins.hexlet.app/get?url=",
        "https://api.codetabs.com/v1/proxy?quest=",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
      ];

      let textData = "";

      for (const p of proxies) {
        try {
          const res = await fetch(p + encodeURIComponent(url));
          if (!res.ok) continue;

          if (p.includes("allorigins")) {
            const j = await res.json();
            textData = j.contents;
          } else {
            textData = await res.text();
          }

          if (textData.length > 100) break;
        } catch { }
      }

      if (!textData) throw new Error("fail");

      let doc = new DOMParser().parseFromString(textData, "text/xml");
      if (doc.querySelector("parsererror")) {
        doc = new DOMParser().parseFromString(textData, "text/html");
      }

      return parse(doc);
    }

    function showMain(push = true) {
      if (push && currentView) historyStack.push({ view: currentView, feedName: currentFeedName });
      document.getElementById('main').style.display = 'flex';
      document.getElementById('feed-view').style.display = 'none';
      document.getElementById('post-view').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
      document.getElementById('header-title').textContent = 'RSS Reader';
      currentView = 'main';
      currentFeedName = null;
      window.scrollTo(0, 0);
    }

    function showFeed(feedName, push = true) {
      if (push && currentView) historyStack.push({ view: currentView, feedName: currentFeedName });
      currentFeedName = feedName;
      document.getElementById('main').style.display = 'none';
      document.getElementById('feed-view').style.display = 'flex';
      document.getElementById('post-view').style.display = 'none';
      document.getElementById('back-btn').style.display = 'flex';
      document.getElementById('header-title').textContent = feedName + ' - All Posts';
      currentView = 'feed';

      renderFeedView(feedName);
      window.scrollTo(0, 0);
    }

    function showPost(feedName, postIndex, push = true) {
      if (push && currentView) historyStack.push({ view: currentView, feedName: currentFeedName });
      currentFeedName = feedName;
      document.getElementById('main').style.display = 'none';
      document.getElementById('feed-view').style.display = 'none';
      document.getElementById('post-view').style.display = 'block';
      document.getElementById('back-btn').style.display = 'flex';
      document.getElementById('header-title').textContent = 'Post Details';
      currentView = 'post';

      renderPostView(feedName, postIndex);
      window.scrollTo(0, 0);
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      if (historyStack.length > 0) {
        const state = historyStack.pop();
        if (state.view === 'main') {
          showMain(false);
        } else if (state.view === 'feed') {
          showFeed(state.feedName, false);
        }
      } else {
        showMain(false);
      }
    });

    function createCard(item, feedName, index) {
      const d = document.createElement("a");
      d.className = "card";
      d.href = "javascript:void(0)";
      d.onclick = (e) => {
        e.preventDefault();
        showPost(feedName, index);
      };

      let preClean = item.desc.replace(/<a[^>]*>\s*Comments\s*<\/a>/gi, "");
      let clean = preClean.replace(/<[^>]+>/g, " ").replace(/\]\]>/g, "").replace(/<!\[CDATA\[/gi, "");
      clean = decodeHTML(clean);
      clean = clean.replace(/\[link\]/gi, "").replace(/\[comments\]/gi, "").replace(/submitted by\s+\/u\/[^\s]+/gi, "");
      clean = clean.replace(/\s+/g, " ").trim();
      clean = clean.slice(0, 120) + (clean.length > 120 ? "..." : "");

      d.innerHTML = `
    ${item.img ? `
    <div class="card-image">
      <img src="${item.img}" loading="lazy">
    </div>
    ` : ""}
    <div class="card-content">
      <h3 class="title">${item.title}</h3>
      <div class="desc">${clean}</div>
      <div class="card-btn">Read</div>
    </div>
  `;
      return d;
    }

    function renderFeedView(feedName) {
      const container = document.getElementById('feed-view');
      container.innerHTML = "";

      const data = allData[feedName] || [];

      if (data.length === 0) {
        container.innerHTML = "<div style='padding:20px; color: var(--muted); font-size: 1.1rem;'>No items available in this feed.</div>";
        return;
      }

      const grid = document.createElement("div");
      grid.className = "feed-grid";

      data.forEach((item, idx) => {
        grid.appendChild(createCard(item, feedName, idx));
      });

      container.appendChild(grid);
    }

    function renderPostView(feedName, postIndex) {
      const container = document.getElementById('post-view');
      const data = allData[feedName];
      if (!data || !data[postIndex]) return;
      const post = data[postIndex];

      let safeDesc = post.desc.replace(/<iframe[\s\S]*?<\/iframe>/gi, '');
      safeDesc = safeDesc.replace(/<script[\s\S]*?<\/script>/gi, '');

      container.innerHTML = `
    <h1 class="post-title">${post.title}</h1>
    <div class="post-meta">
      <span class="post-feed-badge">${feedName}</span>
    </div>
    <div class="post-content">${safeDesc}</div>
    <a href="${post.link}" target="_blank" rel="noopener noreferrer" class="post-link">View Original Article &rarr;</a>
  `;
    }

    function shell(name, lastUpdatedStr) {
      const wrap = document.createElement("div");
      wrap.className = "feed";

      const head = document.createElement("div");
      head.className = "feed-header";
      head.innerHTML = `
    <a href="javascript:void(0)" class="feed-name-link" onclick="showFeed('${name}')">
      ${name} &nbsp;-&nbsp; <span style="font-weight:normal; font-size: 0.9rem; color: var(--muted);">${lastUpdatedStr || 'Loading...'}</span>
    </a>
    <span class="status-badge s">Loading</span>
  `;

      const grid = document.createElement("div");
      grid.className = "feed-grid";

      for (let i = 0; i < 3; i++) {
        const sk = document.createElement("div");
        sk.className = "skeleton";
        grid.appendChild(sk);
      }

      wrap.appendChild(head);
      wrap.appendChild(grid);

      return { wrap, grid, head };
    }

    function renderMainFeed(ui, data, label, feedName, lastUpdatedTime) {
      ui.grid.innerHTML = "";
      data.slice(0, 3).forEach((item, idx) => ui.grid.appendChild(createCard(item, feedName, idx)));
      ui.head.querySelector(".s").textContent = label;

      if (lastUpdatedTime) {
        const timeStr = new Date(lastUpdatedTime).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
        const postCount = data ? data.length : 0;
        ui.head.querySelector(".feed-name-link span").textContent = `${timeStr} (${postCount} posts)`;
      }
    }

    async function load(name, url, ui) {
      const key = "f_" + name;
      const cached = getCache(key);

      if (cached && cached.data && cached.data.length > 0) {
        allData[name] = cached.data;
        renderMainFeed(ui, cached.data, "Cached", name, cached.time);
      }

      try {
        const data = await fetchFeed(url);
        if (!data || data.length === 0) throw new Error("Empty feed");
        setCache(key, data);
        allData[name] = data;
        renderMainFeed(ui, data, "Live", name, Date.now());

        if (currentView === 'feed' && currentFeedName === name) {
          renderFeedView(name);
        }
      } catch (e) {
        if (!cached || !cached.data || cached.data.length === 0) {
          ui.grid.innerHTML = "<div style='padding:16px; color: var(--muted);'>No items found or failed to load.</div>";
          ui.head.querySelector(".s").textContent = "Empty";
          ui.head.querySelector(".feed-name-link span").textContent = "Error";
        }
      }
    }

    const root = document.getElementById("main");

    for (const [n, u] of Object.entries(feeds)) {
      const cached = getCache("f_" + n);
      let infoStr = 'Loading...';
      if (cached && cached.data) {
        const timeStr = new Date(cached.time).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
        infoStr = `${timeStr} (${cached.data.length} posts)`;
      }

      const ui = shell(n, infoStr);
      root.appendChild(ui.wrap);
      load(n, u, ui);
    }

  </script>

</body>

</html>
